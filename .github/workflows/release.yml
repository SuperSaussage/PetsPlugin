name: Build & Publish Plugin JAR

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build plugin JAR
        run: mvn -DskipTests package

      - name: Locate plugin jar
        id: jar
        run: |
          jar_path=$(find target -maxdepth 1 -type f -name 'PetsPlugin-*.jar' | head -n 1)
          echo "jar_path=$jar_path" >> "$GITHUB_ENV"
          echo "jar_name=$(basename "$jar_path")" >> "$GITHUB_ENV"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.jar_path }}
          asset_name: ${{ env.jar_name }}
          asset_content_type: application/java-archive
